<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>IntelNews LIVE</title>

<style>
:root{
--bg:#050505;
--panel:#0b0f0b;
--green:#00ff88;
--yellow:#ffcc00;
--danger:#ff3b3b;
--text:#b6ffda;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:"Courier New",monospace;
padding-top:env(safe-area-inset-top);
padding-bottom:120px;
}

header{
padding:16px;
border-bottom:1px solid #133;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{color:var(--green);}

.threat{
font-size:12px;
padding:4px 8px;
border:1px solid;
}

.low{color:var(--green);border-color:var(--green);}
.medium{color:var(--yellow);border-color:var(--yellow);}
.high{color:var(--danger);border-color:var(--danger);animation:blink 1s infinite;}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.3;}
}

.feed{padding:16px;}

.card{
background:var(--panel);
border:1px solid #133;
padding:14px;
margin-bottom:16px;
cursor:pointer;
}

.tag{font-size:11px;color:var(--green);margin-bottom:6px;}
.title{font-size:14px;margin-bottom:6px;}
.summary{font-size:12px;opacity:0.8;margin-bottom:6px;}
.meta{font-size:11px;}

.impact{
margin-top:8px;
font-size:11px;
border-top:1px dashed #133;
padding-top:6px;
display:none;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#060a06;
border-top:1px solid #133;
display:flex;
justify-content:space-around;
padding:14px 0 calc(14px + env(safe-area-inset-bottom));
}

.nav-item{
text-align:center;
font-size:11px;
color:#0a8;
cursor:pointer;
}

.nav-item.active{color:var(--green);}
</style>
</head>

<body>

<header>
<div class="logo">INTEL//LIVE</div>
<div id="threat" class="threat low">THREAT: NISKI</div>
</header>

<div class="feed" id="feed">
Ładowanie...
</div>

<nav>
<div class="nav-item active" onclick="switchCategory('all', this)">Wszystko</div>
<div class="nav-item" onclick="switchCategory('wojna', this)">Wojny</div>
<div class="nav-item" onclick="switchCategory('rynki', this)">Rynki</div>
<div class="nav-item" onclick="switchCategory('cyber', this)">Cyber</div>
</nav>

<script>
let currentCategory = "all";
let globalNews = [];

function switchCategory(cat, el){
document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
currentCategory = cat;
renderNews();
}

function toggleImpact(id){
const el = document.getElementById("impact-"+id);
el.style.display = el.style.display==="block"?"none":"block";
}
</script>

<!-- TU W DRUGIEJ CZĘŚCI WKLEISZ SILNIK -->

</body>
</html>
