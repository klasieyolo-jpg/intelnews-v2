<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>IntelNews LIVE</title>

<style>
:root{
--bg:#050505;
--panel:#0b0f0b;
--green:#00ff88;
--yellow:#ffcc00;
--danger:#ff3b3b;
--text:#b6ffda;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:"Courier New",monospace;
padding-top:env(safe-area-inset-top);
padding-bottom:120px;
}

header{
padding:16px;
border-bottom:1px solid #133;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{color:var(--green);}

.threat{
font-size:12px;
padding:4px 8px;
border:1px solid;
}

.low{color:var(--green);border-color:var(--green);}
.medium{color:var(--yellow);border-color:var(--yellow);}
.high{color:var(--danger);border-color:var(--danger);animation:blink 1s infinite;}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.3;}
}

.feed{padding:16px;}

.card{
background:var(--panel);
border:1px solid #133;
padding:14px;
margin-bottom:16px;
cursor:pointer;
}

.tag{font-size:11px;color:var(--green);margin-bottom:6px;}
.title{font-size:14px;margin-bottom:6px;}
.summary{font-size:12px;opacity:0.8;margin-bottom:6px;}
.meta{font-size:11px;}

.impact{
margin-top:8px;
font-size:11px;
border-top:1px dashed #133;
padding-top:6px;
display:none;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#060a06;
border-top:1px solid #133;
display:flex;
justify-content:space-around;
padding:14px 0 calc(14px + env(safe-area-inset-bottom));
}

.nav-item{
text-align:center;
font-size:11px;
color:#0a8;
cursor:pointer;
}

.nav-item.active{color:var(--green);}
</style>
</head>

<body>

<header>
<div class="logo">INTEL//LIVE</div>
<div id="threat" class="threat low">THREAT: NISKI</div>
</header>

<div class="feed" id="feed">
Ładowanie...
</div>

<nav>
<div class="nav-item active" onclick="switchCategory('all', this)">Wszystko</div>
<div class="nav-item" onclick="switchCategory('wojna', this)">Wojny</div>
<div class="nav-item" onclick="switchCategory('rynki', this)">Rynki</div>
<div class="nav-item" onclick="switchCategory('cyber', this)">Cyber</div>
</nav>

<script>
let currentCategory = "all";
let globalNews = [];

function switchCategory(cat, el){
document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
currentCategory = cat;
renderNews();
}

function toggleImpact(id){
const el = document.getElementById("impact-"+id);
el.style.display = el.style.display==="block"?"none":"block";
}
</script>

<script>

const feeds = [
  // Polska
  "https://www.gov.pl/rss",
  "https://www.money.pl/rss/",
  "https://www.bankier.pl/rss/wiadomosci.xml",

  // Global
  "https://feeds.reuters.com/reuters/worldNews",
  "http://feeds.bbci.co.uk/news/world/rss.xml",
  "https://www.cnbc.com/id/100003114/device/rss/rss.html",
  "https://www.aljazeera.com/xml/rss/all.xml"
];

const highKeywords = ["war","attack","conflict","invasion","explosion","missile","cyber","hack","zamach","wojna","atak"];
const mediumKeywords = ["bank","oil","gas","sanction","military","crisis","ropa","gaz","bank"];

function calculateRisk(text){
  const t = text.toLowerCase();
  if(highKeywords.some(k=>t.includes(k))) return 9;
  if(mediumKeywords.some(k=>t.includes(k))) return 7;
  return 4;
}

function detectCategory(text){
  const t = text.toLowerCase();
  if(t.includes("cyber") || t.includes("hack")) return "cyber";
  if(t.includes("war") || t.includes("wojna") || t.includes("atak")) return "wojna";
  if(t.includes("bank") || t.includes("oil") || t.includes("ropa")) return "rynki";
  return "all";
}

function getImpact(text){
  const t = text.toLowerCase();
  if(t.includes("wojna") || t.includes("war"))
    return "→ Ropa ↑ | Orlen ↑ | Linie lotnicze ↓ | USD ↑";
  if(t.includes("cyber") || t.includes("hack"))
    return "→ Banki ↓ | Spółki cyber ↑ | IT ↑";
  if(t.includes("bank"))
    return "→ WIG20 ↓ | Obligacje ↑ | PLN ↓";
  return "→ Wpływ ograniczony";
}

async function translateIfNeeded(text){
  if(!text) return "";
  if(/[ąćęłńóśźż]/i.test(text)) return text;

  try{
    const res = await fetch("https://libretranslate.de/translate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        q:text,
        source:"en",
        target:"pl",
        format:"text"
      })
    });
    const data = await res.json();
    return data.translatedText || text;
  }catch{
    return text;
  }
}

async function fetchFeed(url){
  const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
  const res = await fetch(api);
  const data = await res.json();
  return data.items || [];
}

async function loadNews(){
  const feedEl = document.getElementById("feed");
  feedEl.innerHTML = "Ładowanie LIVE...";
  let all = [];

  for(const f of feeds){
    try{
      const items = await fetchFeed(f);
      all = all.concat(items.slice(0,5));
    }catch(e){}
  }

  all.sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
  globalNews = all.slice(0,20);

  renderNews();
}

async function renderNews(){
  const feedEl = document.getElementById("feed");
  feedEl.innerHTML = "";

  let maxRisk = 0;
  let index = 0;

  for(const n of globalNews){
    const cat = detectCategory(n.title);
    if(currentCategory !== "all" && cat !== currentCategory) continue;

    const risk = calculateRisk(n.title);
    if(risk > maxRisk) maxRisk = risk;

    const titlePL = await translateIfNeeded(n.title);
    const descRaw = n.description?.replace(/<[^>]+>/g,'').slice(0,180);
    const descPL = await translateIfNeeded(descRaw);

    feedEl.innerHTML += `
      <div class="card" onclick="toggleImpact(${index})">
        <div class="tag">LIVE</div>
        <div class="title">${titlePL}</div>
        <div class="summary">${descPL}...</div>
        <div class="meta">RISK: ${risk}/10</div>
        <div class="impact" id="impact-${index}">
          ${getImpact(titlePL)}
        </div>
      </div>
    `;
    index++;
  }

  updateThreat(maxRisk);
}

function updateThreat(risk){
  const el = document.getElementById("threat");
  if(risk >= 8){
    el.innerText="THREAT: WYSOKI";
    el.className="threat high";
  }else if(risk >=6){
    el.innerText="THREAT: PODWYŻSZONY";
    el.className="threat medium";
  }else{
    el.innerText="THREAT: NISKI";
    el.className="threat low";
  }
}

loadNews();
setInterval(loadNews,120000);

</script>

</body>
</html>
