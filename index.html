<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>IntelNews V2</title>

<style>
:root {
  --bg: #050505;
  --panel: #0b0f0b;
  --green: #00ff88;
  --green-dim: #008f55;
  --text: #b6ffda;
  --danger: #ff3b3b;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Courier New", monospace;
  padding-top: env(safe-area-inset-top);
  padding-bottom: 120px;
}

header {
  padding: 18px;
  border-bottom: 1px solid var(--green-dim);
  display: flex;
  justify-content: space-between;
}

.logo { color: var(--green); }

.feed { padding: 16px; }

.card {
  background: var(--panel);
  border: 1px solid var(--green-dim);
  padding: 14px;
  margin-bottom: 16px;
}

.tag { font-size: 11px; color: var(--green); margin-bottom: 6px; }
.title { font-size: 15px; margin-bottom: 6px; }
.summary { font-size: 13px; opacity: 0.8; margin-bottom: 6px; }
.meta { font-size: 12px; }

.risk-high { color: var(--danger); }
.risk-medium { color: #ffcc00; }
.risk-low { color: var(--green); }

nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #060a06;
  border-top: 1px solid var(--green-dim);
  display: flex;
  justify-content: space-around;
  padding: 14px 0 calc(14px + env(safe-area-inset-bottom));
}

.nav-item {
  text-align: center;
  font-size: 11px;
  color: var(--green-dim);
  position: relative;
  cursor: pointer;
}

.nav-item .icon { font-size: 20px; }

.nav-item.active {
  color: var(--green);
  text-shadow: 0 0 6px var(--green);
}

.alert-badge {
  position: absolute;
  top: -4px;
  right: 10px;
  background: var(--danger);
  color: white;
  font-size: 10px;
  padding: 2px 5px;
  border-radius: 10px;
}

.toggle {
  margin: 10px 0;
}
</style>
</head>

<body>

<header>
  <div class="logo">INTEL//SITREP</div>
  <div id="activeCategory">POLSKA</div>
</header>

<div class="feed" id="feed"></div>

<nav>
  <div class="nav-item active" onclick="switchCategory('polska', this)">
    <div class="icon">⌂</div>
    Polska
    <div class="alert-badge" id="badge-polska"></div>
  </div>
  <div class="nav-item" onclick="switchCategory('swiat', this)">
    <div class="icon">◎</div>
    Świat
    <div class="alert-badge" id="badge-swiat"></div>
  </div>
  <div class="nav-item" onclick="switchCategory('rynki', this)">
    <div class="icon">▣</div>
    Rynki
    <div class="alert-badge" id="badge-rynki"></div>
  </div>
  <div class="nav-item" onclick="switchCategory('cyber', this)">
    <div class="icon">⌘</div>
    Cyber
    <div class="alert-badge" id="badge-cyber"></div>
  </div>
  <div class="nav-item" onclick="switchCategory('system', this)">
    <div class="icon">⚙</div>
    System
  </div>
</nav>

<script>

const data = {
  polska: [
    { tag:"POLITYKA", title:"Nowa ustawa energetyczna", summary:"Zmiany w regulacjach rynku energii.", risk:6 }
  ],
  swiat: [
    { tag:"WOJNA", title:"Eskalacja konfliktu", summary:"Zniszczona infrastruktura paliwowa.", risk:8 }
  ],
  rynki: [
    { tag:"BANKI", title:"Problemy sektora finansowego", summary:"Spadek indeksów bankowych.", risk:7 }
  ],
  cyber: [
    { tag:"CYBER", title:"Masowy atak ransomware", summary:"Zakłócenia w systemach bankowych.", risk:9 }
  ],
  system: []
};

function renderFeed(category) {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  if (category === "system") {
    feed.innerHTML = `
      <div class="card">
        <div class="title">Ustawienia alertów</div>
        <div class="toggle">☑ Polityka krajowa</div>
        <div class="toggle">☑ Wojny</div>
        <div class="toggle">☑ Cyber</div>
        <div class="toggle">☑ Rynki</div>
        <div class="summary">W przyszłości tutaj dodamy próg risk i powiadomienia push.</div>
      </div>
    `;
    return;
  }

  data[category].forEach(item => {
    const riskClass =
      item.risk >= 8 ? "risk-high" :
      item.risk >= 6 ? "risk-medium" : "risk-low";

    feed.innerHTML += `
      <div class="card">
        <div class="tag">[${item.tag}]</div>
        <div class="title">${item.title}</div>
        <div class="summary">${item.summary}</div>
        <div class="meta ${riskClass}">RISK: ${item.risk}/10</div>
      </div>
    `;
  });
}

function switchCategory(category, el) {
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("activeCategory").innerText = category.toUpperCase();
  renderFeed(category);
}

function updateBadges() {
  Object.keys(data).forEach(cat => {
    if (cat === "system") return;
    const high = data[cat].filter(n => n.risk >= 8).length;
    const badge = document.getElementById("badge-"+cat);
    if (badge && high > 0) badge.innerText = high;
  });
}

renderFeed("polska");
updateBadges();

</script>

</body>
</html>
