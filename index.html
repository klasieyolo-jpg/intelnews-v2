<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>IntelNews LIVE</title>

<style>
:root{
--bg:#050505;
--panel:#0b0f0b;
--green:#00ff88;
--yellow:#ffcc00;
--danger:#ff3b3b;
--text:#b6ffda;
}

html, body{
margin:0;
padding:0;
height:100%;
background:var(--bg);
color:var(--text);
font-family:"Courier New",monospace;
overflow-x:hidden;
}

body{
padding-top:env(safe-area-inset-top);
padding-bottom:100px;
}

header{
padding:16px;
border-bottom:1px solid #133;
display:flex;
justify-content:space-between;
align-items:center;
background:#050505;
position:sticky;
top:0;
z-index:1000;
}

.logo{color:var(--green);}

.threat{
font-size:12px;
padding:4px 8px;
border:1px solid;
}

.low{color:var(--green);border-color:var(--green);}
.medium{color:var(--yellow);border-color:var(--yellow);}
.high{color:var(--danger);border-color:var(--danger);animation:blink 1s infinite;}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.3;}
}

.feed{
padding:16px;
}

.card{
background:var(--panel);
border:1px solid #133;
padding:14px;
margin-bottom:16px;
}

.new-badge{
color:#ff3b3b;
font-size:10px;
margin-bottom:4px;
}

.tag{font-size:11px;color:var(--green);margin-bottom:6px;}

.title{
font-size:14px;
margin-bottom:6px;
cursor:pointer;
color:var(--green);
}

.summary{
font-size:12px;
opacity:0.8;
margin-bottom:6px;
}

.meta{font-size:11px;}

.impact{
margin-top:8px;
font-size:11px;
border-top:1px dashed #133;
padding-top:6px;
}

.article-view{
padding:16px;
line-height:1.6;
}

.back-btn{
margin-bottom:20px;
padding:8px 12px;
background:var(--panel);
border:1px solid #133;
color:var(--green);
cursor:pointer;
}

.source-btn{
display:inline-block;
margin-top:14px;
padding:8px 12px;
border:1px solid var(--green);
color:var(--green);
text-decoration:none;
font-size:12px;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#060a06;
border-top:1px solid #133;
display:flex;
justify-content:space-around;
padding:14px 0 calc(14px + env(safe-area-inset-bottom));
z-index:2000;
}

.nav-item{
text-align:center;
font-size:11px;
color:#0a8;
cursor:pointer;
}

.nav-item.active{
color:var(--green);
}
</style>
</head>

<body>

<header>
<div class="logo">INTEL//LIVE</div>
<div id="threat" class="threat low">THREAT: NISKI</div>
</header>

<div class="feed" id="feed">
Ładowanie...
</div>

<nav>
<div class="nav-item active" onclick="switchCategory('all', this)">Wszystko</div>
<div class="nav-item" onclick="switchCategory('wojna', this)">Wojny</div>
<div class="nav-item" onclick="switchCategory('rynki', this)">Rynki</div>
<div class="nav-item" onclick="switchCategory('cyber', this)">Cyber</div>
</nav>

<script>

let currentCategory = "all";
let globalNews = [];
let previousNewsLinks = [];
let newNewsLinks = [];

function calculateRisk(text){
const t = text.toLowerCase();
if(t.includes("war")||t.includes("wojna")||t.includes("atak")) return 9;
if(t.includes("bank")||t.includes("ropa")||t.includes("oil")) return 7;
return 4;
}

function detectCategory(text){
const t = text.toLowerCase();
if(t.includes("cyber")||t.includes("hack")) return "cyber";
if(t.includes("war")||t.includes("wojna")||t.includes("atak")) return "wojna";
if(t.includes("bank")||t.includes("oil")||t.includes("ropa")) return "rynki";
return "all";
}

function getImpact(text){
const t = text.toLowerCase();
if(t.includes("war")||t.includes("wojna"))
return "→ Ropa ↑ | Orlen ↑ | Linie lotnicze ↓ | USD ↑";
if(t.includes("cyber")||t.includes("hack"))
return "→ Banki ↓ | Cybersec ↑ | IT ↑";
if(t.includes("bank"))
return "→ WIG20 ↓ | PLN ↓";
return "→ Wpływ ograniczony";
}

async function loadNews(){

const response = await fetch("/api/news");
const data = await response.json();

if(!data.success){
document.getElementById("feed").innerHTML = "Błąd pobierania danych";
return;
}

const fetchedNews = data.news;
const currentLinks = fetchedNews.map(n => n.link);

newNewsLinks = currentLinks.filter(link => !previousNewsLinks.includes(link));
previousNewsLinks = currentLinks;

globalNews = fetchedNews;
renderNews();
}

function renderNews(){

const feedEl = document.getElementById("feed");
feedEl.innerHTML = "";

let maxRisk = 0;

globalNews.forEach((n, index)=>{

const cat = detectCategory(n.title);
if(currentCategory!=="all" && cat!==currentCategory) return;

const risk = calculateRisk(n.title);
if(risk>maxRisk) maxRisk=risk;

const desc = n.description?.replace(/<[^>]+>/g,'');

feedEl.innerHTML+=`
<div class="card">
${newNewsLinks.includes(n.link) ? '<div class="new-badge">NOWE</div>' : ''}
<div class="tag">LIVE</div>
<div class="title" onclick="openArticle(${index})">${n.title}</div>
<div class="summary">${desc.slice(0,160)}...</div>
<div class="meta">RISK: ${risk}/10</div>
</div>
`;

});

updateThreat(maxRisk);
}

function openArticle(index){

const n = globalNews[index];
const desc = n.description?.replace(/<[^>]+>/g,'');

document.getElementById("feed").innerHTML=`
<div class="article-view">
<button class="back-btn" onclick="loadNews()">⬅ POWRÓT</button>
<h2 style="color:var(--green)">${n.title}</h2>
<p>${desc}</p>
<div class="impact">
<strong>WPŁYW NA RYNEK:</strong><br>
${getImpact(n.title)}
</div>
<a class="source-btn" href="${n.link}" target="_blank">Czytaj oryginał</a>
</div>`;
}

function updateThreat(risk){
const el=document.getElementById("threat");
if(risk>=8){
el.innerText="THREAT: WYSOKI";
el.className="threat high";
}else if(risk>=6){
el.innerText="THREAT: PODWYŻSZONY";
el.className="threat medium";
}else{
el.innerText="THREAT: NISKI";
el.className="threat low";
}
}

function switchCategory(cat, el){
document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
currentCategory=cat;
renderNews();
}

loadNews();
setInterval(loadNews,120000);

</script>

</body>
</html>
