<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>IntelNews LIVE</title>

<style>
:root{
--bg:#050505;
--panel:#0b0f0b;
--green:#00ff88;
--yellow:#ffcc00;
--danger:#ff3b3b;
--text:#b6ffda;
}

html, body{
margin:0;
padding:0;
height:100%;
background:var(--bg);
color:var(--text);
font-family:"Courier New",monospace;
overflow-x:hidden;
touch-action:manipulation;
overscroll-behavior:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
}

body{
padding-top:env(safe-area-inset-top);
padding-bottom:100px;
}

header{
padding:16px;
border-bottom:1px solid #133;
display:flex;
justify-content:space-between;
align-items:center;
background:#050505;
position:sticky;
top:0;
z-index:1000;
}

.logo{color:var(--green);}

.threat{
font-size:12px;
padding:4px 8px;
border:1px solid;
}

.low{color:var(--green);border-color:var(--green);}
.medium{color:var(--yellow);border-color:var(--yellow);}
.high{color:var(--danger);border-color:var(--danger);animation:blink 1s infinite;}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.3;}
}

.feed{
padding:16px;
}

.card{
background:var(--panel);
border:1px solid #133;
padding:14px;
margin-bottom:16px;
}

.tag{font-size:11px;color:var(--green);margin-bottom:6px;}
.title{
font-size:14px;
margin-bottom:6px;
cursor:pointer;
color:var(--green);
}
.summary{font-size:12px;opacity:0.8;margin-bottom:6px;}
.meta{font-size:11px;}

.impact{
margin-top:8px;
font-size:11px;
border-top:1px dashed #133;
padding-top:6px;
display:none;
}

.article-view{
padding:16px;
line-height:1.6;
white-space:pre-line;
}

.back-btn{
margin-bottom:20px;
padding:8px 12px;
background:var(--panel);
border:1px solid #133;
color:var(--green);
cursor:pointer;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#060a06;
border-top:1px solid #133;
display:flex;
justify-content:space-around;
padding:14px 0 calc(14px + env(safe-area-inset-bottom));
z-index:2000;
}

.nav-item{
text-align:center;
font-size:11px;
color:#0a8;
cursor:pointer;
}

.nav-item.active{
color:var(--green);
}
</style>
</head>

<body>

<header>
<div class="logo">INTEL//LIVE</div>
<div id="threat" class="threat low">THREAT: NISKI</div>
</header>

<div class="feed" id="feed">
Ładowanie...
</div>

<nav>
<div class="nav-item active" onclick="switchCategory('all', this)">Wszystko</div>
<div class="nav-item" onclick="switchCategory('wojna', this)">Wojny</div>
<div class="nav-item" onclick="switchCategory('rynki', this)">Rynki</div>
<div class="nav-item" onclick="switchCategory('cyber', this)">Cyber</div>
<div class="nav-item" onclick="switchCategory('system', this)">System</div>
</nav>

<script>

let currentCategory = "all";
let globalNews = [];

function calculateRisk(text){
const t = text.toLowerCase();
if(t.includes("war")||t.includes("wojna")||t.includes("atak")) return 9;
if(t.includes("bank")||t.includes("ropa")||t.includes("oil")) return 7;
return 4;
}

function detectCategory(text){
const t = text.toLowerCase();
if(t.includes("cyber")||t.includes("hack")) return "cyber";
if(t.includes("war")||t.includes("wojna")||t.includes("atak")) return "wojna";
if(t.includes("bank")||t.includes("oil")||t.includes("ropa")) return "rynki";
return "all";
}

function getImpact(text){
const t = text.toLowerCase();
if(t.includes("war")||t.includes("wojna"))
return "→ Ropa ↑ | Orlen ↑ | Linie lotnicze ↓ | USD ↑";
if(t.includes("cyber")||t.includes("hack"))
return "→ Banki ↓ | Cybersec ↑ | IT ↑";
if(t.includes("bank"))
return "→ WIG20 ↓ | PLN ↓";
return "→ Wpływ ograniczony";
}

async function loadNews(){
const response = await fetch("/api/news");
const data = await response.json();

if(!data.success){
  document.getElementById("feed").innerHTML = "Błąd pobierania danych";
  return;
}

globalNews = data.news;
renderNews();
}

function renderNews(){
const feedEl = document.getElementById("feed");
feedEl.innerHTML = "";

let maxRisk = 0;
let index = 0;

for(const n of globalNews){

const cat = detectCategory(n.title);
if(currentCategory!=="all" && cat!==currentCategory) continue;

const risk = calculateRisk(n.title);
if(risk>maxRisk) maxRisk=risk;

const desc = n.description?.replace(/<[^>]+>/g,'').slice(0,160);

feedEl.innerHTML+=`
<div class="card">
<div class="tag">LIVE</div>
<div class="title" onclick="openArticle('${n.link}')">${n.title}</div>
<div class="summary">${desc}...</div>
<div class="meta">RISK: ${risk}/10</div>
<div class="impact" id="impact-${index}">
${getImpact(n.title)}
</div>
<div style="margin-top:6px;font-size:11px;cursor:pointer;color:#0a8;" onclick="toggleImpact(${index})">
▼ Pokaż wpływ
</div>
</div>`;
index++;
}

updateThreat(maxRisk);
}

async function openArticle(url){

document.getElementById("feed").innerHTML="Ładowanie artykułu...";

const response = await fetch("/api/article?url="+encodeURIComponent(url));
const data = await response.json();

if(!data.success){
document.getElementById("feed").innerHTML="Nie udało się pobrać artykułu";
return;
}

document.getElementById("feed").innerHTML=`
<div class="article-view">
<button class="back-btn" onclick="loadNews()">⬅ POWRÓT</button>
${data.content}
</div>`;
}

function updateThreat(risk){
const el=document.getElementById("threat");
if(risk>=8){
el.innerText="THREAT: WYSOKI";
el.className="threat high";
}else if(risk>=6){
el.innerText="THREAT: PODWYŻSZONY";
el.className="threat medium";
}else{
el.innerText="THREAT: NISKI";
el.className="threat low";
}
}

function toggleImpact(id){
const el=document.getElementById("impact-"+id);
el.style.display = el.style.display==="block"?"none":"block";
}

function switchCategory(cat, el){
document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
el.classList.add("active");
currentCategory=cat;
renderNews();
}

loadNews();
setInterval(loadNews,120000);

</script>

</body>
</html>
